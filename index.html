<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fikrago AI SEO Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #080c14;
  --bg2: #0d1421;
  --bg3: #111827;
  --card: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --accent: #00e5ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --text: #f1f5f9;
  --muted: #64748b;
  --danger: #ef4444;
  --warn: #f59e0b;
  --sidebar-w: 240px;
}
[data-theme="light"] {
  --bg: #f0f4ff;
  --bg2: #e8edf8;
  --bg3: #dde4f0;
  --card: rgba(255,255,255,0.7);
  --card-border: rgba(100,120,200,0.15);
  --text: #0f172a;
  --muted: #64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--card-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--card-border)}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;color:var(--muted);font-size:14px;transition:all .2s;border-left:3px solid transparent;margin:1px 0}
.nav-item:hover,.nav-item.active{color:var(--text);background:var(--card);border-left-color:var(--accent)}
.nav-item.active{color:var(--accent)}
.nav-icon{width:18px;text-align:center;font-size:16px}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--card-border)}
.donate-btn{display:block;text-align:center;background:linear-gradient(135deg,#f59e0b,#ef4444);color:white;padding:10px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;transition:opacity .2s}
.donate-btn:hover{opacity:.85}

/* Main */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:64px;background:var(--bg2);border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.theme-toggle{background:var(--card);border:1px solid var(--card-border);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:16px}
.status-dot{width:8px;height:8px;background:var(--accent3);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Content */
.content{padding:28px;flex:1}

/* Cards */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:24px;backdrop-filter:blur(12px)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Other CSS remains the same, skipped for brevity */

/* Add JS to toggle theme & pages */
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">⚡ Fikrago AI</div>
    <div class="logo-sub">SEO Pro Platform</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="nav-icon">📊</span>Dashboard</div>
    <div class="nav-item" onclick="showPage('keywords',this)"><span class="nav-icon">🔍</span>Keyword Research</div>
    <div class="nav-item" onclick="showPage('competitor',this)"><span class="nav-icon">🏆</span>Competitor Analysis</div>
    <div class="nav-item" onclick="showPage('serp',this)"><span class="nav-icon">📈</span>SERP Analyzer</div>
    <div class="nav-item" onclick="showPage('internal',this)"><span class="nav-icon">🔗</span>Internal Links</div>
    <div class="nav-section">AI Tools</div>
    <div class="nav-item" onclick="showPage('chat',this)"><span class="nav-icon">🤖</span>AI Chat Mode</div>
    <div class="nav-item" onclick="showPage('analytics',this)"><span class="nav-icon">📉</span>Analytics</div>
    <div class="nav-section">More</div>
    <div class="nav-item" onclick="showPage('products',this)"><span class="nav-icon">🛍️</span>Products</div>
    <div class="nav-item" onclick="showPage('settings',this)"><span class="nav-icon">⚙️</span>Settings</div>
    <div class="nav-item" onclick="showPage('about',this)"><span class="nav-icon">ℹ️</span>About</div>
  </nav>
  <div class="sidebar-footer">
    <a href="https://paypal.me/websiteMA" target="_blank" class="donate-btn">❤️ Support Us</a>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div class="topbar-title" id="page-title">Dashboard</div>
    </div>
    <div class="topbar-right">
      <span style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px">
        <span class="status-dot"></span>AI Active
      </span>
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
  </header>

  <div class="content">
    <h1 style="color:white;text-align:center;margin-top:50px;">Fikrago AI SEO Pro Loaded!</h1>
  </div>
</div>

<script>
function toggleTheme() {
  document.documentElement.dataset.theme =
    document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
}

// Simple page switching (for demo, add full logic later)
function showPage(pageId, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId)?.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('page-title').innerText = el?.innerText || 'Dashboard';
}
</script>
</body>
</html>
